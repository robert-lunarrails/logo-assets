[build]
  publish = "."

# Serve index.html for all routes (SPA-style fallback)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security + cache headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Suggested site name: logo-assets
# Set this in: Netlify Dashboard → Site configuration → Site details → Change site name
